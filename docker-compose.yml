# MiroFish - Multi-Agent Social Simulation Platform
# Docker Compose configuration

version: '3.8'

services:
  # Main MiroFish application
  mirofish:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ZEP_API_URL=${ZEP_API_URL:-http://zep:8000}
      - ZEP_API_KEY=${ZEP_API_KEY}
    volumes:
      - mirofish-data:/app/uploads
      - mirofish-db:/app/data
    depends_on:
      - zep
    networks:
      - mirofish-network
    restart: unless-stopped

  # Zep memory server
  zep:
    image: ghcr.io/getzep/zep:latest
    ports:
      - "8000:8000"
    environment:
      - ZEP_SERVER_HOST=0.0.0.0
      - ZEP_SERVER_PORT=8000
      - ZEP_LLM_OPENAI_APIKEY=${OPENAI_API_KEY}
      - ZEP_LLM_SERVICE=openai
      - ZEP_LLM_MODEL=gpt-4
      - ZEP_EMBEDDINGS_SERVICE=openai
      - ZEP_EMBEDDINGS_OPENAI_APIKEY=${OPENAI_API_KEY}
      - ZEP_EMBEDDINGS_DIMENSIONS=1536
      - ZEP_STORE_POSTGRES_DSN=postgres://postgres:postgres@postgres:5432/zep?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mirofish-network
    restart: unless-stopped

  # PostgreSQL for Zep
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=zep
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mirofish-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mirofish-data:
  mirofish-db:
  postgres-data:

networks:
  mirofish-network:
    driver: bridge